version: '3.8'
services:
  web:
    build: ..
    restart: always
    # 依赖数据库和 Redis 启动后再启动
    depends_on:
      - db
      - redis
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DB=ainame396

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ainame
    ports:
      - "5432:5432"
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ainame
    volumes:
      - mysql_data:/var/lib/mysql # 数据持久化，防止重启丢失
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data # 缓存持久化
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
volumes:
  mysql_data:
  redis_data: