version: "3.8"

services:
  web:
    build: ..
    restart: always
    depends_on:
      - db
      - redis
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DB=ainame396
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  name_worker:
    build: ..
    restart: always
    command: python name_worker.py
    depends_on:
      - db
      - redis
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DB=ainame396
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  email_worker:
    build: ..
    restart: always
    command: python email_worker.py
    depends_on:
      - redis
      - rabbitmq
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DB=ainame396
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ainame
    ports:
      - "5432:5432"

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ainame
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  mysql_data:
  redis_data:
